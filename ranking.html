<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>排名查詢｜健力成績資料庫</title>
<style>
  :root {
    --bg: #f6f3ee;
    --card: #fffdf8;
    --ink: #2b2723;
    --muted: #7a7168;
    --line: #e6ded4;
    --accent: #8b5e3c;
    --accent-dark: #6f4528;
    --accent-soft: #f2e5d8;
    --cream: #fffaf3;
    --shadow: 0 16px 40px rgba(73, 55, 36, .08);
    --radius-lg: 24px;
    --radius-md: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: radial-gradient(circle at top left, #fff7e8, var(--bg) 42%, #efe8df);
    color: var(--ink);
    line-height: 1.6;
  }

  .wrap {
    width: min(1180px, calc(100% - 28px));
    margin: 0 auto;
    padding: 28px 0 48px;
  }

  .hero {
    background: rgba(255, 253, 248, .92);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
  }

  .hero::after {
    content: "";
    position: absolute;
    right: -80px;
    top: -80px;
    width: 220px;
    height: 220px;
    border-radius: 999px;
    background: rgba(215, 176, 138, .28);
    pointer-events: none;
  }

  .hero h1 {
    margin: 0;
    font-size: clamp(30px, 5vw, 48px);
    letter-spacing: .04em;
    line-height: 1.18;
  }

  .hero-subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 19px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 18px;
  }

  .info-card {
    background: var(--cream);
    border: 1px dashed #dac7b4;
    border-radius: var(--radius-md);
    padding: 13px 14px;
    font-size: 18px;
  }

  .info-card strong {
    display: block;
    color: var(--accent-dark);
    margin-bottom: 3px;
  }

  .notice {
    margin-top: 14px;
    color: var(--muted);
    font-size: 17px;
  }

  .panel {
    background: rgba(255, 253, 248, .92);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 16px;
  }

  .panel-title {
    margin: 0 0 12px;
    font-size: 22px;
    font-weight: 850;
    letter-spacing: .02em;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .menu-button {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 58px;
    border-radius: 18px;
    padding: 12px 16px;
    background: var(--accent);
    color: #fff;
    font-size: 20px;
    font-weight: 850;
    text-decoration: none;
    text-align: center;
    box-shadow: 0 10px 22px rgba(111, 69, 40, .12);
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
  }

  .menu-button:hover {
    transform: translateY(-1px);
    background: var(--accent-dark);
    box-shadow: 0 12px 24px rgba(111, 69, 40, .18);
  }

  .menu-button:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(139, 94, 60, .18), 0 12px 24px rgba(111, 69, 40, .18);
  }

  .search-box {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr 1.2fr auto;
    gap: 12px;
    align-items: end;
  }

  .field label {
    display: block;
    font-size: 17px;
    color: var(--muted);
    font-weight: 750;
    margin-bottom: 6px;
  }

  input,
  select {
    width: 100%;
    min-height: 46px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 20px;
    outline: none;
    appearance: none;
  }

  .dropdown-content input[type="checkbox"] {
    width: auto;
    min-height: auto;
    appearance: auto;
    margin-right: 7px;
    accent-color: var(--accent);
  }

  select {
    background-image: linear-gradient(45deg, transparent 50%, var(--accent) 50%), linear-gradient(135deg, var(--accent) 50%, transparent 50%);
    background-position: calc(100% - 18px) 19px, calc(100% - 12px) 19px;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
    padding-right: 34px;
  }

  input:focus,
  select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139, 94, 60, .14);
  }

  button {
    border: 0;
    border-radius: 999px;
    min-height: 46px;
    padding: 10px 18px;
    font-size: 19px;
    font-weight: 850;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    white-space: nowrap;
    transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(111, 69, 40, .18);
  }

  button:active { transform: translateY(0); }

  .toolbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .column-control {
    position: relative;
    display: inline-block;
  }

  .dropbtn {
    background: var(--accent-soft);
    color: var(--accent-dark);
    min-height: 40px;
    padding: 8px 14px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-dark);
    padding: 7px 12px;
    font-size: 18px;
    font-weight: 800;
  }

  .dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: var(--card);
    min-width: 340px;
    max-width: min(90vw, 460px);
    box-shadow: 0 18px 42px rgba(73, 55, 36, .16);
    z-index: 100;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 18px;
    max-height: 420px;
    overflow-y: auto;
  }

  .dropdown-content label {
    display: block;
    break-inside: avoid;
    padding: 5px 0;
    font-size: 18px;
    cursor: pointer;
    text-align: left;
  }

  .dropdown-content input {
    width: auto;
    min-height: auto;
    margin-right: 7px;
    accent-color: var(--accent);
  }

  .show { display: block; }

  .result-wrap {
    background: rgba(255, 253, 248, .92);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  #result {
    min-height: 120px;
  }

  .empty-state,
  .loading-state {
    padding: 26px 20px;
    color: var(--muted);
    text-align: center;
  }

  .result-table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    font-size: 19px;
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  .result-table th,
  .result-table td {
    border-bottom: 1px solid var(--line);
    border-right: 1px solid #f0e7dc;
    padding: 10px 12px;
    text-align: center;
    background: #fffdf8;
  }

  .result-table th {
    background: #f4e7d9;
    color: #5d3c25;
    position: sticky;
    top: 0;
    z-index: 10;
    font-weight: 850;
  }

  .result-table tbody tr:nth-child(even) td {
    background: #fff8ef;
  }

  .result-table tbody tr:hover td {
    background: #f8eadc;
  }

  .result-table td:first-child,
  .result-table th:first-child {
    position: sticky;
    left: 0;
    z-index: 11;
    box-shadow: 8px 0 12px rgba(73, 55, 36, .05);
    width: calc(5em + 24px);
    min-width: calc(5em + 24px);
    max-width: calc(5em + 24px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .result-table th:first-child {
    background: #ead3bc;
    z-index: 12;
  }

  .result-table td:first-child {
    background: #fffaf3;
    font-weight: 800;
    color: var(--accent-dark);
  }

  .hide-column {
    display: none !important;
  }

  .small-action {
    background: transparent;
    color: var(--accent-dark);
    border: 1px solid var(--line);
    min-height: 40px;
    padding: 8px 14px;
  }

  @media (max-width: 900px) {
    .search-box {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .search-box button {
      grid-column: 1 / -1;
    }
    .info-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 560px) {
    .wrap {
      width: min(100% - 18px, 1180px);
      padding-top: 12px;
    }
    .hero,
    .panel {
      padding: 16px;
      border-radius: 20px;
    }

    .menu-grid {
      grid-template-columns: 1fr;
    }
    .search-box {
      grid-template-columns: 1fr;
    }
    .dropdown-content {
      left: 0;
      right: auto;
      min-width: min(92vw, 360px);
    }
    .result-table {
      font-size: 18px;
    }
    .result-table th,
    .result-table td {
      padding: 9px 10px;
    }
  }


  .ranking-search-box {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .ranking-search-box button {
    grid-column: auto;
  }

  button:disabled {
    opacity: .45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  @media (max-width: 900px) {
    .ranking-search-box {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 560px) {
    .ranking-search-box {
      grid-template-columns: 1fr;
    }
  }

</style>
</head>
<body>

<main class="wrap">
  <section class="hero">
    <h1>健力成績資料庫</h1>
    <div class="hero-subtitle">查詢台灣健力公開比賽成績，可依姓名、量級、賽制與賽事篩選。</div>

    <div class="info-grid">
      <div class="info-card">
        <strong>已建置</strong>
        110、113、114、115 青年盃｜109–114 菁英盃｜109–113 全民運
      </div>
      <div class="info-card">
        <strong>近期規劃</strong>
        所有可取得的協會比賽成績
      </div>
      <div class="info-card">
        <strong>長期規劃</strong>
        國手選拔｜健身房自辦賽事
      </div>
    </div>

    <div class="notice">

  rudy_hattori_pinhead

</a>。本文所載內容僅供學術研究與教學交流之用，不得用於任何商業目的。
    </div>
  </section>

  <section class="panel">
    <p class="panel-title">功能選單</p>

    <div class="menu-grid" aria-label="功能選單">
      <a class="menu-button" href="index.html">綜合查詢</a>
      <a class="menu-button" href="records.html">全國紀錄查詢</a>
      <a class="menu-button" href="competitions.html">賽事成績查詢</a>
    </div>
  </section>

  <section class="panel">
    <p class="panel-title">排名查詢</p>

    <div class="search-box ranking-search-box">
      <div class="field">
        <label for="searchYear">年份</label>
        <select id="searchYear" onchange="updateRankingButtonState()">
          <option value="">請選擇年份</option>
          <option>2018</option>
          <option>2019</option>
          <option>2020</option>
          <option>2021</option>
          <option>2022</option>
          <option>2023</option>
          <option>2024</option>
          <option>2025</option>
          <option>2026</option>
        </select>
      </div>

      <div class="field">
        <label for="searchGender">性別</label>
        <select id="searchGender" onchange="handleGenderChange()">
          <option value="">請選擇性別</option>
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>

      <div class="field">
        <label for="searchGroup">組別</label>
        <select id="searchGroup" onchange="handleGroupChange()" disabled>
          <option value="">請先選擇性別</option>
        </select>
      </div>

      <div class="field">
        <label for="searchWeight">量級</label>
        <select id="searchWeight" onchange="updateRankingButtonState()" disabled>
          <option value="">請先選擇組別</option>
        </select>
      </div>

      <div class="field">
        <label for="searchType">賽制</label>
        <select id="searchType" onchange="updateRankingButtonState()">
          <option value="">請選擇賽制</option>
          <option value="裝備">裝備</option>
          <option value="經典">經典</option>
        </select>
      </div>

      <div class="field">
        <label for="searchLift">項目</label>
        <select id="searchLift" onchange="updateRankingButtonState()">
          <option value="">請選擇項目</option>
          <option value="蹲舉">蹲舉</option>
          <option value="臥舉">臥舉</option>
          <option value="硬舉">硬舉</option>
          <option value="總和">總和</option>
        </select>
      </div>

      <button id="searchButton" onclick="searchRankingData()" type="button" disabled>查詢</button>
    </div>

    <div class="toolbar">
      <div class="status-pill" id="statusText">資料載入中…</div>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="small-action" onclick="clearSearch()" type="button">清空條件</button>
      </div>
    </div>
  </section>

  <section class="result-wrap">
    <div id="result" class="loading-state">資料載入中，請稍候…</div>
  </section>
</main>

<script>
let sheetData = [];
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFAGAxugycmghkxnrii5L1llC3kX1uFN-1sFbry6ft6LsyeenLrKiBg7RLspwtsaxpiXNR5ESLg7Ru/pub?gid=633174637&single=true&output=csv';

const GROUP_OPTIONS = {
  '男': ['公開男子組', '高中男子組', '國中男子組', '長青男子組1', '長青男子組2', '長青男子組3', '長青男子組4'],
  '女': ['公開女子組', '高中女子組', '國中女子組', '長青女子組1', '長青女子組2', '長青女子組3', '長青女子組4']
};

const WEIGHT_CLASSES = {
  maleOpen: ['59', '66', '74', '83', '93', '105', '120', '120+'],
  femaleOpen: ['47', '52', '57', '63', '69', '76', '84', '84+'],
  maleYouth: ['53', '59', '66', '74', '83', '93', '105', '120', '120+'],
  femaleYouth: ['43', '47', '52', '57', '63', '69', '76', '84', '84+']
};

async function fetchSheetData() {
  try {
    const response = await fetch(`${SHEET_URL}&cacheBust=${Date.now()}`);
    const csvText = await response.text();
    sheetData = parseCSV(csvText);
    document.getElementById('statusText').textContent = `已載入 ${sheetData.length} 筆資料`;
    document.getElementById('result').className = 'empty-state';
    document.getElementById('result').innerHTML = '請選擇年份、性別、組別、量級、賽制與項目後查詢。';
  } catch (error) {
    console.error('Error fetching sheet data:', error);
    document.getElementById('statusText').textContent = '資料載入失敗';
    document.getElementById('result').className = 'empty-state';
    document.getElementById('result').innerHTML = '無法載入資料，請檢查網路連線。';
  }
}

function parseCSV(csv) {
  const rows = [];
  let current = '';
  let row = [];
  let inQuotes = false;

  for (let i = 0; i < csv.length; i++) {
    const char = csv[i];
    const next = csv[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      current += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      row.push(current.trim());
      current = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(current.trim());
      if (row.some(cell => cell !== '')) rows.push(row);
      row = [];
      current = '';
    } else {
      current += char;
    }
  }

  if (current || row.length) {
    row.push(current.trim());
    if (row.some(cell => cell !== '')) rows.push(row);
  }

  if (rows.length === 0) return [];
  const headers = rows[0].map(header => header.trim());

  return rows.slice(1).map(values => {
    const rowObject = {};
    headers.forEach((header, index) => {
      rowObject[header] = values[index] || '';
    });
    return rowObject;
  });
}

function normalizeText(value) {
  return String(value || '')
    .normalize('NFKC')
    .trim()
    .replace(/\s+/g, '')
    .replace(/[ ​-‍﻿]/g, '')
    .replaceAll('＋', '+');
}

function canonicalWeight(value) {
  return String(value || '')
    .normalize('NFKC')
    .trim()
    .replaceAll('＋', '+')
    .replace(/\s+/g, '')
    .replace(/kg$/i, '');
}

function parseNumber(value) {
  const match = String(value || '').replace(',', '').match(/-?\d+(?:\.\d+)?/);
  return match ? Number(match[0]) : NaN;
}

function getRowYear(rowData) {
  const dateText = String(rowData['日期'] || '').trim();
  const yearMatch = dateText.match(/(?:19|20)\d{2}/);
  return yearMatch ? yearMatch[0] : '';
}

function getField(rowData, candidates) {
  const normalizedMap = {};
  Object.keys(rowData).forEach(key => {
    normalizedMap[normalizeText(key)] = rowData[key];
  });

  for (const key of candidates) {
    const normalizedKey = normalizeText(key);
    if (normalizedMap[normalizedKey] !== undefined) {
      return String(normalizedMap[normalizedKey] || '').trim();
    }
  }

  return '';
}

function getBirthValue(rowData) {
  return getField(rowData, ['生日', '出生年', '出生日期', 'Birth', 'Birth Date', 'BirthYear']);
}

function getBodyweightValue(rowData) {
  return getField(rowData, ['體重', 'Bd.Wt.', 'Bd.Wt', 'Bodyweight', 'Body Weight', 'BW']);
}

function getGroupMatches(groupInput, genderInput) {
  if (groupInput === '全部') {
    const baseGroups = GROUP_OPTIONS[genderInput] || [];
    if (genderInput === '男') return [...baseGroups, '男子組'];
    if (genderInput === '女') return [...baseGroups, '女子組'];
    return baseGroups;
  }

  if (groupInput === '公開男子組') return ['公開男子組', '男子組'];
  if (groupInput === '公開女子組') return ['公開女子組', '女子組'];
  return [groupInput];
}

function rowMatchesGroup(rowData, groupInput, genderInput) {
  const rowGroup = normalizeText(rowData['組別']);
  return getGroupMatches(groupInput, genderInput).some(groupName => normalizeText(groupName) === rowGroup);
}

function getWeightClassesForGroup(group, gender) {
  if (group === '全部') {
    if (gender === '男') return WEIGHT_CLASSES.maleYouth;
    if (gender === '女') return WEIGHT_CLASSES.femaleYouth;
    return [];
  }

  if (group.includes('國中男子組') || group.includes('高中男子組')) return WEIGHT_CLASSES.maleYouth;
  if (group.includes('國中女子組') || group.includes('高中女子組')) return WEIGHT_CLASSES.femaleYouth;
  if (group.includes('男子組')) return WEIGHT_CLASSES.maleOpen;
  if (group.includes('女子組')) return WEIGHT_CLASSES.femaleOpen;
  return [];
}

function setSelectOptions(selectId, options, placeholder) {
  const select = document.getElementById(selectId);
  select.innerHTML = `<option value="">${escapeHTML(placeholder)}</option>`;

  options.forEach(optionValue => {
    const option = document.createElement('option');
    option.value = optionValue;
    option.textContent = optionValue;
    select.appendChild(option);
  });

  select.disabled = options.length === 0;
}

function handleGenderChange() {
  const genderInput = document.getElementById('searchGender').value.trim();
  const groups = genderInput ? ['全部', ...(GROUP_OPTIONS[genderInput] || [])] : [];
  setSelectOptions('searchGroup', groups, genderInput ? '請選擇組別' : '請先選擇性別');
  setSelectOptions('searchWeight', [], '請先選擇組別');
  updateRankingButtonState();
}

function handleGroupChange() {
  const genderInput = document.getElementById('searchGender').value.trim();
  const groupInput = document.getElementById('searchGroup').value.trim();
  const weights = getWeightClassesForGroup(groupInput, genderInput);
  setSelectOptions('searchWeight', weights, groupInput ? '請選擇量級' : '請先選擇組別');
  updateRankingButtonState();
}

function updateRankingButtonState() {
  const requiredIds = ['searchYear', 'searchGender', 'searchGroup', 'searchWeight', 'searchType', 'searchLift'];
  const isReady = requiredIds.every(id => document.getElementById(id).value.trim());
  document.getElementById('searchButton').disabled = !isReady;
}

function searchRankingData() {
  const yearInput = document.getElementById('searchYear').value.trim();
  const genderInput = document.getElementById('searchGender').value.trim();
  const groupInput = document.getElementById('searchGroup').value.trim();
  const weightInput = document.getElementById('searchWeight').value.trim();
  const typeInput = document.getElementById('searchType').value.trim();
  const liftInput = document.getElementById('searchLift').value.trim();

  if (!yearInput || !genderInput || !groupInput || !weightInput || !typeInput || !liftInput) {
    document.getElementById('result').className = 'empty-state';
    document.getElementById('result').innerHTML = '請先完整選擇年份、性別、組別、量級、賽制與項目。';
    updateRankingButtonState();
    return;
  }

  const matchedRows = sheetData.filter(rowData => {
    return getRowYear(rowData) === yearInput &&
           rowMatchesGroup(rowData, groupInput, genderInput) &&
           canonicalWeight(rowData['量級']) === canonicalWeight(weightInput) &&
           normalizeText(rowData['賽制']) === normalizeText(typeInput);
  }).sort((a, b) => {
    const scoreA = parseNumber(a[liftInput]);
    const scoreB = parseNumber(b[liftInput]);
    const hasScoreA = Number.isFinite(scoreA);
    const hasScoreB = Number.isFinite(scoreB);

    if (hasScoreA && hasScoreB) {
      const scoreDiff = scoreB - scoreA;
      if (scoreDiff !== 0) return scoreDiff;
    } else if (hasScoreA && !hasScoreB) {
      return -1;
    } else if (!hasScoreA && hasScoreB) {
      return 1;
    }

    return normalizeText(a['姓名']).localeCompare(normalizeText(b['姓名']), 'zh-Hant');
  });

  renderRankingTable(matchedRows, { yearInput, genderInput, groupInput, weightInput, typeInput, liftInput });
}

function renderRankingTable(rows, query) {
  if (rows.length === 0) {
    document.getElementById('result').className = 'empty-state';
    document.getElementById('result').innerHTML = `查無排名資料。<br>目前查詢條件：<strong>${escapeHTML(query.yearInput)}</strong>｜<strong>${escapeHTML(query.groupInput)}</strong>｜<strong>${escapeHTML(query.weightInput)}</strong>｜<strong>${escapeHTML(query.typeInput)}</strong>｜<strong>${escapeHTML(query.liftInput)}</strong>`;
    document.getElementById('statusText').textContent = `查詢結果 0 筆｜總資料 ${sheetData.length} 筆`;
    return;
  }

  let resultHTML = '<table class="result-table"><thead><tr>';
  ['姓名', '生日', '體重', query.liftInput, '日期', '賽事'].forEach(header => {
    resultHTML += `<th>${escapeHTML(header)}</th>`;
  });
  resultHTML += '</tr></thead><tbody>';

  rows.forEach(rowData => {
    resultHTML += '<tr>';
    resultHTML += `<td>${escapeHTML(rowData['姓名'] || '')}</td>`;
    resultHTML += `<td>${escapeHTML(getBirthValue(rowData))}</td>`;
    resultHTML += `<td>${escapeHTML(getBodyweightValue(rowData))}</td>`;
    resultHTML += `<td>${escapeHTML(rowData[query.liftInput] || '')}</td>`;
    resultHTML += `<td>${escapeHTML(rowData['日期'] || '')}</td>`;
    resultHTML += `<td>${escapeHTML(rowData['賽事'] || '')}</td>`;
    resultHTML += '</tr>';
  });

  resultHTML += '</tbody></table>';
  document.getElementById('result').className = '';
  document.getElementById('result').innerHTML = resultHTML;
  document.getElementById('statusText').textContent = `${query.yearInput}｜${query.groupInput}｜${query.weightInput}｜${query.typeInput}｜${query.liftInput}｜排名資料 ${rows.length} 筆`;
}

function clearSearch() {
  document.getElementById('searchYear').value = '';
  document.getElementById('searchGender').value = '';
  document.getElementById('searchType').value = '';
  document.getElementById('searchLift').value = '';
  setSelectOptions('searchGroup', [], '請先選擇性別');
  setSelectOptions('searchWeight', [], '請先選擇組別');
  document.getElementById('result').className = 'empty-state';
  document.getElementById('result').innerHTML = '請選擇年份、性別、組別、量級、賽制與項目後查詢。';
  document.getElementById('statusText').textContent = `已載入 ${sheetData.length} 筆資料`;
  updateRankingButtonState();
}

function escapeHTML(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

window.onload = fetchSheetData;
</script>
