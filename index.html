<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>健力成績資料庫</title>
<style>
  :root {
    --bg: #f6f3ee;
    --card: #fffdf8;
    --ink: #2b2723;
    --muted: #7a7168;
    --line: #e6ded4;
    --accent: #8b5e3c;
    --accent-dark: #6f4528;
    --accent-soft: #f2e5d8;
    --cream: #fffaf3;
    --shadow: 0 16px 40px rgba(73, 55, 36, .08);
    --radius-lg: 24px;
    --radius-md: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: radial-gradient(circle at top left, #fff7e8, var(--bg) 42%, #efe8df);
    color: var(--ink);
    line-height: 1.6;
  }

  .wrap {
    width: min(1180px, calc(100% - 28px));
    margin: 0 auto;
    padding: 28px 0 48px;
  }

  .hero {
    background: rgba(255, 253, 248, .92);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
  }

  .hero::after {
    content: "";
    position: absolute;
    right: -80px;
    top: -80px;
    width: 220px;
    height: 220px;
    border-radius: 999px;
    background: rgba(215, 176, 138, .28);
    pointer-events: none;
  }

  .hero h1 {
    margin: 0;
    font-size: clamp(30px, 5vw, 48px);
    letter-spacing: .04em;
    line-height: 1.18;
  }

  .hero-subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 15px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 18px;
  }

  .info-card {
    background: var(--cream);
    border: 1px dashed #dac7b4;
    border-radius: var(--radius-md);
    padding: 13px 14px;
    font-size: 14px;
  }

  .info-card strong {
    display: block;
    color: var(--accent-dark);
    margin-bottom: 3px;
  }

  .notice {
    margin-top: 14px;
    color: var(--muted);
    font-size: 13px;
  }

  .panel {
    background: rgba(255, 253, 248, .92);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 16px;
  }

  .panel-title {
    margin: 0 0 12px;
    font-size: 18px;
    font-weight: 850;
    letter-spacing: .02em;
  }

  .search-box {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr 1.2fr auto;
    gap: 12px;
    align-items: end;
  }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    font-weight: 750;
    margin-bottom: 6px;
  }

  input,
  select {
    width: 100%;
    min-height: 46px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 16px;
    outline: none;
    appearance: none;
  }

  .dropdown-content input[type="checkbox"] {
    width: auto;
    min-height: auto;
    appearance: auto;
    margin-right: 7px;
    accent-color: var(--accent);
  }

  select {
    background-image: linear-gradient(45deg, transparent 50%, var(--accent) 50%), linear-gradient(135deg, var(--accent) 50%, transparent 50%);
    background-position: calc(100% - 18px) 19px, calc(100% - 12px) 19px;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
    padding-right: 34px;
  }

  input:focus,
  select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139, 94, 60, .14);
  }

  button {
    border: 0;
    border-radius: 999px;
    min-height: 46px;
    padding: 10px 18px;
    font-size: 15px;
    font-weight: 850;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    white-space: nowrap;
    transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(111, 69, 40, .18);
  }

  button:active { transform: translateY(0); }

  .toolbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 14px;
  }

  .column-control {
    position: relative;
    display: inline-block;
  }

  .dropbtn {
    background: var(--accent-soft);
    color: var(--accent-dark);
    min-height: 40px;
    padding: 8px 14px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-dark);
    padding: 7px 12px;
    font-size: 14px;
    font-weight: 800;
  }

  .dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    background: var(--card);
    min-width: 340px;
    max-width: min(90vw, 460px);
    box-shadow: 0 18px 42px rgba(73, 55, 36, .16);
    z-index: 100;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 18px;
    max-height: 420px;
    overflow-y: auto;
    column-count: 2;
    column-gap: 18px;
  }

  .dropdown-content label {
    display: block;
    break-inside: avoid;
    padding: 5px 0;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
  }

  .dropdown-content input {
    width: auto;
    min-height: auto;
    margin-right: 7px;
    accent-color: var(--accent);
  }

  .show { display: block; }

  .result-wrap {
    background: rgba(255, 253, 248, .92);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  #result {
    min-height: 120px;
  }

  .empty-state,
  .loading-state {
    padding: 26px 20px;
    color: var(--muted);
    text-align: center;
  }

  .result-table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    font-size: 15px;
    display: block;
    overflow-x: auto;
    white-space: nowrap;
  }

  .result-table th,
  .result-table td {
    border-bottom: 1px solid var(--line);
    border-right: 1px solid #f0e7dc;
    padding: 10px 12px;
    text-align: center;
    background: #fffdf8;
  }

  .result-table th {
    background: #f4e7d9;
    color: #5d3c25;
    position: sticky;
    top: 0;
    z-index: 10;
    font-weight: 850;
  }

  .result-table tbody tr:nth-child(even) td {
    background: #fff8ef;
  }

  .result-table tbody tr:hover td {
    background: #f8eadc;
  }

  .result-table td:first-child,
  .result-table th:first-child {
    position: sticky;
    left: 0;
    z-index: 11;
    box-shadow: 8px 0 12px rgba(73, 55, 36, .05);
  }

  .result-table th:first-child {
    background: #ead3bc;
    z-index: 12;
  }

  .result-table td:first-child {
    background: #fffaf3;
    font-weight: 800;
    color: var(--accent-dark);
  }

  .hide-column {
    display: none !important;
  }

  .small-action {
    background: transparent;
    color: var(--accent-dark);
    border: 1px solid var(--line);
    min-height: 40px;
    padding: 8px 14px;
  }

  @media (max-width: 900px) {
    .search-box {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .search-box button {
      grid-column: 1 / -1;
    }
    .info-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 560px) {
    .wrap {
      width: min(100% - 18px, 1180px);
      padding-top: 12px;
    }
    .hero,
    .panel {
      padding: 16px;
      border-radius: 20px;
    }
    .search-box {
      grid-template-columns: 1fr;
    }
    .dropdown-content {
      left: 0;
      right: auto;
      min-width: min(92vw, 360px);
      column-count: 1;
    }
    .result-table {
      font-size: 14px;
    }
    .result-table th,
    .result-table td {
      padding: 9px 10px;
    }
  }
</style>
</head>
<body>

<main class="wrap">
  <section class="hero">
    <h1>健力成績資料庫</h1>
    <div class="hero-subtitle">查詢台灣健力公開比賽成績，可依姓名、量級、賽制與賽事篩選。</div>

    <div class="info-grid">
      <div class="info-card">
        <strong>已建置</strong>
        110、113、114、115 青年盃｜109–114 菁英盃｜109–113 全民運
      </div>
      <div class="info-card">
        <strong>近期規劃</strong>
        所有可取得的協會比賽成績
      </div>
      <div class="info-card">
        <strong>長期規劃</strong>
        國手選拔｜健身房自辦賽事
      </div>
    </div>

    <div class="notice">
      資料是從公開 PDF 整理而來，可能會有一些不可預期的錯誤；若發現異狀，歡迎聯絡作者IG:<a href="https://www.instagram.com/rudy_hattori_pinhead/" target="_blank" rel="noopener noreferrer">

  rudy_hattori_pinhead

</a>。本文所載內容僅供學術研究與教學交流之用，不得用於任何商業目的。
    </div>
  </section>

  <section class="panel">
    <p class="panel-title">搜尋條件</p>

    <div class="search-box">
      <div class="field">
        <label for="searchName">姓名</label>
        <input id="searchName" placeholder="輸入姓名" type="text" />
      </div>

      <div class="field">
        <label for="searchWeight">量級</label>
        <select id="searchWeight">
          <option value="">全部量級</option>
          <option disabled style="font-weight: bold;">-----男子量級-----</option>
          <option value="53kg">53kg(U18)</option>
          <option>59kg</option><option>66kg</option><option>74kg</option><option>83kg</option>
          <option>93kg</option><option>105kg</option><option>120kg</option><option>120+kg</option>
          <option disabled style="font-weight: bold;">-----女子量級-----</option>
          <option value="43kg">43kg(U18)</option>
          <option>47kg</option><option>52kg</option><option>57kg</option><option>63kg</option>
          <option>69kg</option><option value="72kg">72kg(2020以前)</option><option>76kg</option>
          <option>84kg</option><option>84+kg</option>
        </select>
      </div>

      <div class="field">
        <label for="searchType">賽制</label>
        <select id="searchType">
          <option value="">全部賽制</option>
          <option value="裝備">裝備</option>
          <option value="經典">經典</option>
        </select>
      </div>

      <div class="field">
        <label for="searchEvent">賽事</label>
        <input id="searchEvent" placeholder="輸入賽事" type="text" />
      </div>

      <button onclick="searchData()" type="button">查詢</button>
    </div>

    <div class="toolbar">
      <div class="status-pill" id="statusText">資料載入中…</div>

      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="small-action" onclick="clearSearch()" type="button">清空條件</button>
        <div class="column-control">
          <button class="dropbtn" onclick="toggleDropdown()" type="button">顯示／隱藏欄位 ▾</button>
          <div class="dropdown-content" id="columnDropdown"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="result-wrap">
    <div id="result" class="loading-state">資料載入中，請稍候…</div>
  </section>
</main>

<script>
let sheetData = [];
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFAGAxugycmghkxnrii5L1llC3kX1uFN-1sFbry6ft6LsyeenLrKiBg7RLspwtsaxpiXNR5ESLg7Ru/pub?gid=633174637&single=true&output=csv';

async function fetchSheetData() {
  try {
    const response = await fetch(SHEET_URL);
    const csvText = await response.text();
    sheetData = parseCSV(csvText);
    setupColumnSelector();
    document.getElementById('statusText').textContent = `已載入 ${sheetData.length} 筆資料`;
    document.getElementById('result').className = 'empty-state';
    document.getElementById('result').innerHTML = '請輸入條件後查詢。若想顯示全部資料，可直接按「查詢」。';
  } catch (error) {
    console.error('Error fetching sheet data:', error);
    document.getElementById('statusText').textContent = '資料載入失敗';
    document.getElementById('result').className = 'empty-state';
    document.getElementById('result').innerHTML = '無法載入資料，請檢查網路連線。';
  }
}

function parseCSV(csv) {
  const rows = [];
  let current = '';
  let row = [];
  let inQuotes = false;

  for (let i = 0; i < csv.length; i++) {
    const char = csv[i];
    const next = csv[i + 1];

    if (char === '"' && inQuotes && next === '"') {
      current += '"';
      i++;
    } else if (char === '"') {
      inQuotes = !inQuotes;
    } else if (char === ',' && !inQuotes) {
      row.push(current.trim());
      current = '';
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && next === '\n') i++;
      row.push(current.trim());
      if (row.some(cell => cell !== '')) rows.push(row);
      row = [];
      current = '';
    } else {
      current += char;
    }
  }

  if (current || row.length) {
    row.push(current.trim());
    if (row.some(cell => cell !== '')) rows.push(row);
  }

  if (rows.length === 0) return [];
  const headers = rows[0].map(header => header.trim());

  return rows.slice(1).map(values => {
    const rowObject = {};
    headers.forEach((header, index) => {
      rowObject[header] = values[index] || '';
    });
    return rowObject;
  });
}

function setupColumnSelector() {
  if (sheetData.length === 0) return;
  const dropdown = document.getElementById('columnDropdown');
  const headers = Object.keys(sheetData[0]);

  dropdown.innerHTML = '';
  headers.forEach((header, index) => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" checked data-index="${index}" onchange="applyColumnVisibility()"> ${header}`;
    dropdown.appendChild(label);
  });
}

function toggleDropdown() {
  document.getElementById('columnDropdown').classList.toggle('show');
}

function applyColumnVisibility() {
  const checkboxes = document.querySelectorAll('#columnDropdown input');
  const table = document.querySelector('.result-table');
  if (!table) return;

  checkboxes.forEach((cb) => {
    const index = parseInt(cb.getAttribute('data-index'));
    const isVisible = cb.checked;
    const rows = table.rows;

    for (let i = 0; i < rows.length; i++) {
      const cell = rows[i].cells[index];
      if (cell) {
        cell.classList.toggle('hide-column', !isVisible);
      }
    }
  });
}

function escapeHTML(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function searchData() {
  const nameInput = document.getElementById('searchName').value.trim();
  const weightInput = document.getElementById('searchWeight').value.trim();
  const eventInput = document.getElementById('searchEvent').value.trim();
  const typeInput = document.getElementById('searchType').value.trim();

  if (sheetData.length === 0) return;

  const headers = Object.keys(sheetData[0]);
  const matchedRows = sheetData.filter(rowData => {
    const rowName = rowData['姓名'] || '';
    const rowWeight = rowData['量級'] || '';
    const rowEvent = rowData['賽事'] || '';
    const rowType = rowData['賽制'] || '';

    return (
      (nameInput === '' || rowName.includes(nameInput)) &&
      (weightInput === '' || rowWeight === weightInput) &&
      (typeInput === '' || rowType === typeInput) &&
      (eventInput === '' || rowEvent.includes(eventInput))
    );
  });

  if (matchedRows.length === 0) {
    document.getElementById('result').className = 'empty-state';
    document.getElementById('result').innerHTML = '查無資料，請調整搜尋條件。';
    document.getElementById('statusText').textContent = `查詢結果 0 筆｜總資料 ${sheetData.length} 筆`;
    return;
  }

  let resultHTML = '<table class="result-table"><thead><tr>';
  headers.forEach(header => {
    resultHTML += `<th>${escapeHTML(header)}</th>`;
  });
  resultHTML += '</tr></thead><tbody>';

  matchedRows.forEach(rowData => {
    resultHTML += '<tr>';
    headers.forEach(header => {
      resultHTML += `<td>${escapeHTML(rowData[header] || '')}</td>`;
    });
    resultHTML += '</tr>';
  });

  resultHTML += '</tbody></table>';
  document.getElementById('result').className = '';
  document.getElementById('result').innerHTML = resultHTML;
  document.getElementById('statusText').textContent = `查詢結果 ${matchedRows.length} 筆｜總資料 ${sheetData.length} 筆`;

  applyColumnVisibility();
}

function clearSearch() {
  document.getElementById('searchName').value = '';
  document.getElementById('searchWeight').value = '';
  document.getElementById('searchType').value = '';
  document.getElementById('searchEvent').value = '';
  document.getElementById('result').className = 'empty-state';
  document.getElementById('result').innerHTML = '請輸入條件後查詢。若想顯示全部資料，可直接按「查詢」。';
  document.getElementById('statusText').textContent = `已載入 ${sheetData.length} 筆資料`;
}

['searchName', 'searchEvent'].forEach(id => {
  document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById(id);
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter') searchData();
    });
  });
});

window.onclick = function(event) {
  if (!event.target.matches('.dropbtn') && !event.target.closest('.dropdown-content')) {
    document.getElementById('columnDropdown').classList.remove('show');
  }
};

window.onload = fetchSheetData;
</script>

</body>
</html>
